apiVersion: kustomize.config.k8s.io/v1beta1

resources:
  - ../../base

images:
  - name: quickfit-api
    newName: ghcr.io/mszal449/quickfit-api
    newTag: latest
  - name: quickfit-frontend
    newName: ghcr.io/mszal449/quickfit-frontend
    newTag: latest

patches:
  - target:
      kind: Ingress
      name: quickfit
    patch: |-
      - op: add
        path: /spec/ingressClassName
        value: trafeik
      - op: replace
        path: /spec/rules/0/host
        value: quickfit.example.com

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
